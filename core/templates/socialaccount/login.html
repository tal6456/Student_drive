{% extends "core/base.html" %}
{% load socialaccount %} 

{% block title %}מתחבר לגוגל...{% endblock %}

{% block content %}
<div class="container d-flex flex-column align-items-center justify-content-center" style="min-height: 60vh;" dir="rtl">
    <div class="spinner-border text-primary mb-4" role="status" style="width: 3rem; height: 3rem;"></div>
    <h3 class="fw-bold" style="color: var(--gd-text);">מייצר חיבור מאובטח מול Google...</h3>
    <p class="text-muted">אנא המתן מספר שניות</p>

    {# Hidden form submitted automatically in a secure way #}
    <form id="google-auto-submit" method="post" action="{% provider_login_url 'google' %}" style="display: none;">
        {% csrf_token %}
    </form>
</div>

<script>
    // שולח את הטופס המאובטח אוטומטית ברגע שהדף נטען!
    document.addEventListener('DOMContentLoaded', function() {
        document.getElementById('google-auto-submit').submit();
    });
</script>
{% endblock %}
