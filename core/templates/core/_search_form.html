<form class="{{ form_class|default:'mb-4' }}" action="{% url 'global_search' %}" method="GET">
    <div class="input-group search-input-group shadow-sm rounded-pill overflow-hidden border">
        <button class="btn search-btn" type="submit" aria-label="חפש">
            <i class="fas fa-search"></i>
        </button>
        <input id="{{ search_input_id|default:'globalSearchInput' }}"
               class="form-control search-input border-0"
               type="search"
               name="q"
               placeholder="חיפוש..."
               value="{{ request.GET.q }}"
               required
               autocomplete="off"
               aria-label="חיפוש">
    </div>
</form>
