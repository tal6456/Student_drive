<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>התחברות לדרייב</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; margin: 40px; display: flex; justify-content: center; }
        .login-box { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; }
        button { background-color: #2ecc71; color: white; border: none; padding: 12px; width: 100%; border-radius: 4px; cursor: pointer; font-size: 1.1em; }
        .links { margin-top: 20px; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>ברוך שובך! 👋</h1>
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">התחבר</button>
        </form>
        <div class="links">
            <p>עוד לא רשום? <a href="{% url 'register' %}" style="color: #3498db;">להרשמה לחץ כאן</a></p>
            <a href="{% url 'home' %}" style="color: #7f8c8d;">חזרה לדף הבית</a>
        </div>
    </div>
</body>
</html>
