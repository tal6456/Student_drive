{% load static %}  <!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <title>Student Agent</title>
</head>
<body>
{% load static %}
<div id="student-agent-container" style="direction: rtl;">
    <button id="agent-toggle-btn" type="button" class="shadow-lg">
        <img src="{% static 'Robot.gif' %}" class="agent-icon-salute" alt="מצדיע">
    </button>

    <div id="agent-chat-window" class="agent-hidden shadow-lg border">
        <div class="agent-header d-flex justify-content-between align-items-center bg-primary text-white p-2">
            <h6 class="m-0">
                <i class="fas fa-user-graduate me-2"></i> 
                <span>הסוכן של {{ user.first_name|default:"עמית" }}</span>
            </h6>
            <button id="agent-close-btn" class="btn btn-sm text-white">&times;</button>
        </div>

        <div id="agent-messages" class="p-3 bg-light" style="height: 300px; overflow-y: auto;">
        </div>
        
        <div class="p-2 border-top bg-white d-flex gap-2">
            <input type="file" id="agent-file-input" hidden accept=".pdf,.docx">
            <button class="btn btn-outline-primary btn-sm flex-grow-1" onclick="document.getElementById('agent-file-input').click()">
                <i class="fas fa-file-upload"></i> העלה חומר
            </button>
            <button id="quiz-mode-btn" class="btn btn-outline-warning btn-sm flex-grow-1">
                <i class="fas fa-graduation-cap"></i> Quiz Mode
            </button>
        </div>

        <div class="agent-input-area p-2 border-top d-flex">
            <input type="text" id="agent-user-input" class="form-control form-control-sm ms-2" placeholder="שאל אותי משהו...">
            <button id="agent-send-btn" class="btn btn-primary btn-sm">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>
</div>
</body>
</html>
