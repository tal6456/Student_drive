<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>AI Architecture Mirror</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.2.0/github-markdown-dark.min.css">
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            padding: 40px 20px;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .actions-container {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            max-width: 900px;
            margin-left: auto;
            margin-right: auto;
        }
        .action-btn {
            display: inline-block;
            padding: 8px 16px;
            color: #ffffff !important;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            font-size: 16px;
        }
        .btn-back { background: #238636; }
        .btn-back:hover { background: #2ea043; }
        .btn-pdf { background: #1f6feb; }
        .btn-pdf:hover { background: #388bfd; }

        .markdown-body {
            box-sizing: border-box;
            max-width: 900px;
            margin: 0 auto;
            padding: 45px;
            background-color: #161b22;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.8);
            color: #e6edf3 !important;
            direction: rtl;
            text-align: right;
        }

        .markdown-body blockquote {
            border-left: none !important;
            border-right: 4px solid #30363d !important;
            padding-right: 1em !important;
            padding-left: 0 !important;
            color: #8b949e !important;
        }
        .markdown-body h1, .markdown-body h2, .markdown-body h3 {
            color: #ffffff !important;
            border-bottom: 1px solid #21262d !important;
        }

        /* ==========================================
           הקסם האמיתי: הגדרות מיוחדות רק לייצור ה-PDF
           ========================================== */
        @media print {
            /* מכריח את הדפדפן להדפיס גם את רקע הלילה המגניב */
            body, .markdown-body {
                background-color: #0d1117 !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }

            /* מעלים את הכפתורים למעלה כדי שלא יופיעו במסמך */
            .actions-container {
                display: none !important;
            }

            /* מבטל את הצלליות והשוליים כדי שזה יישב מושלם על הדף */
            .markdown-body {
                box-shadow: none !important;
                max-width: 100% !important;
                padding: 0 20px !important;
            }

            /* מונע במפורש חיתוך של פסקאות, רשימות ובלוקים של קוד באמצע הדף */
            pre, blockquote, tr, img, li, p {
                page-break-inside: avoid !important;
                break-inside: avoid !important;
            }

            /* דואג שכותרות לא יישארו יתומות בתחתית הדף */
            h1, h2, h3 {
                page-break-after: avoid !important;
                break-after: avoid !important;
            }
        }
    </style>
</head>
<body>

    <div class="actions-container">
        <a href="{% url 'home' %}" class="action-btn btn-back">⬅️ חזרה לאתר</a>
        <button onclick="window.print()" class="action-btn btn-pdf">📄 שמור כ-PDF</button>
    </div>

    <div id="pdf-wrapper" class="markdown-body">
        <textarea id="raw-markdown" style="display: none;">{{ report_content|safe }}</textarea>
        <div id="content" dir="rtl">טוען נתונים מהסוכן... 🤖</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script type="module">
        import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';

        mermaid.initialize({ startOnLoad: false, theme: 'dark' });

        const rawMd = document.getElementById('raw-markdown').value;
        const contentDiv = document.getElementById('content');
        contentDiv.innerHTML = marked.parse(rawMd);

        setTimeout(() => {
            mermaid.run({ querySelector: '.language-mermaid' });
        }, 100);
    </script>
</body>
</html>
