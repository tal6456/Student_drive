<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>AI Architecture Mirror</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.2.0/github-markdown-dark.min.css">
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            padding: 40px 20px;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        .markdown-body {
            box-sizing: border-box;
            max-width: 900px;
            margin: 0 auto;
            padding: 45px;
            background-color: #161b22;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.8);
            color: #e6edf3 !important;
        }
        /* תיקוני כיווניות (RTL) לציטוטים וכותרות */
        .markdown-body blockquote {
            border-left: none !important;
            border-right: 4px solid #30363d !important;
            padding-right: 1em !important;
            padding-left: 0 !important;
            color: #8b949e !important;
        }
        .markdown-body h1, .markdown-body h2, .markdown-body h3 {
            color: #ffffff !important;
            border-bottom: 1px solid #21262d !important;
        }
        .markdown-body a { color: #58a6ff !important; }

        /* עיצוב כפתורי הפעולה למעלה */
        .actions-container {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }
        .action-btn {
            display: inline-block;
            padding: 8px 16px;
            color: #ffffff !important;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 600;
            transition: background 0.2s;
            cursor: pointer;
            border: none;
            font-size: 16px;
        }
        .btn-back { background: #238636; }
        .btn-back:hover { background: #2ea043; }
        .btn-pdf { background: #1f6feb; }
        .btn-pdf:hover { background: #388bfd; }
    </style>
</head>
<body>

    <div class="markdown-body">
        <div class="actions-container">
            <a href="{% url 'home' %}" class="action-btn btn-back">⬅️ חזרה לאתר</a>
            <button id="download-pdf" class="action-btn btn-pdf">📄 הורד כ-PDF</button>
        </div>

        <textarea id="raw-markdown" style="display: none;">{{ report_content|safe }}</textarea>

        <div id="content">טוען נתונים מהסוכן... 🤖</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script type="module">
        import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';

        mermaid.initialize({ startOnLoad: false, theme: 'dark' });

        const rawMd = document.getElementById('raw-markdown').value;
        const contentDiv = document.getElementById('content');
        contentDiv.innerHTML = marked.parse(rawMd);

        // ציור התרשים והגדרת כפתור ה-PDF
        setTimeout(() => {
            mermaid.run({ querySelector: '.language-mermaid' }).then(() => {

                // ברגע שהתרשימים מוכנים, נפעיל את כפתור ההורדה
                document.getElementById('download-pdf').addEventListener('click', () => {
                    const opt = {
                        margin:       [10, 10, 10, 10], // שוליים
                        filename:     'Student_Drive_AI_Report.pdf',
                        image:        { type: 'jpeg', quality: 0.98 },
                        html2canvas:  { scale: 2, useCORS: true, backgroundColor: '#0d1117' }, // שומר על צבע הרקע השחור
                        jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
                    };

                    // משנה קצת את הכפתור כדי להראות שזה עובד
                    const btn = document.getElementById('download-pdf');
                    const originalText = btn.innerText;
                    btn.innerText = "⏳ מכין PDF...";

                    html2pdf().set(opt).from(contentDiv).save().then(() => {
                        btn.innerText = originalText;
                    });
                });

            });
        }, 100);
    </script>
</body>
</html>
