<div class="col-md-6 col-lg-4 animate__animated animate__fadeInUp">
    <div class="card h-100 border-0 shadow-sm rounded-4 hover-up transition" style="background-color: var(--gd-card);">
        <div class="card-body p-4 d-flex flex-column">
            <div class="d-flex align-items-center gap-3 mb-3">
                <div class="rounded-circle bg-light d-flex align-items-center justify-content-center" style="width: 50px; height: 50px;">
                    <i class="fas fa-users text-primary fs-4"></i>
                </div>
                <div class="overflow-hidden">
                    <h6 class="fw-bold mb-0 text-truncate" style="color: var(--gd-text);">{{ comm.name }}</h6>
                    <span class="text-muted small">{{ comm.members.count }} חברים</span>
                </div>
            </div>

            <p class="small text-muted flex-grow-1">{{ comm.description|truncatechars:80|default:"אין תיאור זמין לקהילה זו." }}</p>

            <div class="mt-auto pt-3 border-top d-flex justify-content-between align-items-center" style="border-color: var(--gd-border) !important;">
                <a href="{% url 'community_feed' %}?community={{ comm.id }}" class="btn btn-sm btn-light rounded-pill px-3 fw-bold">צפה בפיד</a>

                {% if comm.id in my_community_ids %}
                    <span class="badge rounded-pill bg-success bg-opacity-10 text-success fw-bold px-3 py-2">
                        <i class="fas fa-check-circle ms-1"></i> חבר בקהילה
                    </span>
                {% else %}
                    <a href="{% url 'join_community' comm.id %}" class="btn btn-sm btn-primary rounded-pill px-3 fw-bold">הצטרף</a>
                {% endif %}
            </div>
        </div>
    </div>
</div>
