<div class="d-flex gap-2 mb-2 animate__animated animate__fadeIn">
    {% if comment_user_img or comment.user.profile.profile_picture %}
        <img src="{{ comment_user_img|default:comment.user.profile.profile_picture.url }}" class="rounded-circle shadow-sm" style="width: 30px; height: 30px; object-fit: cover;">
    {% else %}
        <div class="rounded-circle bg-light d-flex align-items-center justify-content-center border" style="width: 30px; height: 30px;">
            <i class="fas fa-user text-muted" style="font-size: 0.7rem;"></i>
        </div>
    {% endif %}

    <div class="p-2 rounded-4 px-3 flex-grow-1 shadow-sm" style="background-color: var(--gd-bg); border: 1px solid var(--gd-border);">
        <div class="d-flex justify-content-between align-items-center mb-1">
            <span class="fw-bold small" style="color: var(--gd-text);">{{ comment_username|default:comment.user.username }}</span>
            <span class="text-muted" style="font-size: 0.65rem;">{{ comment_created|default:comment.created_at|timesince }}</span>
        </div>
        <p class="small mb-0" style="color: var(--gd-text); white-space: pre-wrap;">{{ comment_text|default:comment.text }}</p>
    </div>
</div>
