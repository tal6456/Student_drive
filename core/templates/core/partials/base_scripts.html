<script type="text/javascript">
    const GT_COOKIE_NAME = 'googtrans';
    const GT_STORAGE_KEY = 'preferred_lang';
    const GT_SOURCE_LANG = 'he';
    const GT_SUPPORTED = ['he', 'en'];

    function gtSetCookie(name, value) {
        const expires = new Date();
        expires.setFullYear(expires.getFullYear() + 1);
        const cookieBase = `${name}=${value}; expires=${expires.toUTCString()}; path=/; SameSite=Lax`;

        document.cookie = cookieBase;

        const host = window.location.hostname;
        if (host !== 'localhost' && !host.includes('127.0.0.1')) {
            document.cookie = `${cookieBase}; domain=.${host}`;
            document.cookie = `${cookieBase}; domain=${host}`;
        }
    }

    function forceTranslate(lang) {
        const target = GT_SUPPORTED.includes(lang) ? lang : GT_SOURCE_LANG;
        localStorage.setItem(GT_STORAGE_KEY, target);

        if (target === GT_SOURCE_LANG) {
            document.cookie = `${GT_COOKIE_NAME}=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;`;
            const host = window.location.hostname;
            document.cookie = `${GT_COOKIE_NAME}=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/; domain=.${host}`;
        } else {
            gtSetCookie(GT_COOKIE_NAME, `/${GT_SOURCE_LANG}/${target}`);
        }

        window.location.reload();
    }

    function googleTranslateElementInit() {
        new google.translate.TranslateElement({
            pageLanguage: GT_SOURCE_LANG,
            includedLanguages: GT_SUPPORTED.join(','),
            layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
            autoDisplay: true
        }, 'google_translate_element');
    }

    document.addEventListener('DOMContentLoaded', function() {
        const preferred = localStorage.getItem(GT_STORAGE_KEY);
        if (preferred && preferred !== GT_SOURCE_LANG) {
            const expectedValue = `/${GT_SOURCE_LANG}/${preferred}`;
            if (!document.cookie.includes(GT_COOKIE_NAME)) {
                gtSetCookie(GT_COOKIE_NAME, expectedValue);
                setTimeout(() => {
                    if (!document.querySelector('.goog-te-spinner-pos')) {
                        window.location.reload();
                    }
                }, 1000);
            }
        }
    });
</script>

<script>
function toggleFavorite(event, el) {
    event.preventDefault();
    const url = el.dataset.url;
    const starIcon = el.querySelector('i');

    fetch(url, {
        method: 'POST',
        headers: {
            'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value,
            'X-Requested-With': 'XMLHttpRequest'
        }
    })
    .then(response => response.json())
    .then(data => {
        if (data.is_favorite) {
            starIcon.classList.remove('far', 'opacity-50');
            starIcon.classList.add('fas', 'text-warning');
            starIcon.animate([
                { transform: 'scale(1)', opacity: 0.5 },
                { transform: 'scale(1.6)', opacity: 1 },
                { transform: 'scale(1)', opacity: 1 }
            ], {
                duration: 400,
                easing: 'ease-out'
            });
            createStarParticles(el);
        } else {
            starIcon.classList.remove('fas', 'text-warning');
            starIcon.classList.add('far', 'opacity-50');
        }
    })
    .catch(err => console.error(err));
}

function createStarParticles(el) {
    for (let i = 0; i < 5; i++) {
        const particle = document.createElement('div');
        particle.style.position = 'absolute';
        particle.style.width = '6px';
        particle.style.height = '6px';
        particle.style.background = '#FFD700';
        particle.style.borderRadius = '50%';
        particle.style.top = '50%';
        particle.style.left = '50%';
        particle.style.pointerEvents = 'none';
        particle.style.zIndex = 1000;
        el.appendChild(particle);

        const angle = Math.random() * 2 * Math.PI;
        const distance = 30 + Math.random() * 20;

        particle.animate([
            { transform: 'translate(0,0) scale(1)', opacity: 1 },
            { transform: `translate(${Math.cos(angle) * distance}px, ${Math.sin(angle) * distance}px) scale(0.5)`, opacity: 0 }
        ], {
            duration: 500 + Math.random() * 200,
            easing: 'ease-out'
        });

        setTimeout(() => particle.remove(), 700);
    }
}
</script>

<script>
function globalDelete(itemType, itemId, reloadPage = true) {
    Swal.fire({
        title: 'בטוח שברצונך למחוק?',
        text: 'לא ניתן לבטל פעולה זו!',
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#d33',
        cancelButtonColor: '#3085d6',
        confirmButtonText: 'כן, מחק!',
        cancelButtonText: 'ביטול',
        reverseButtons: true
    }).then((result) => {
        if (result.isConfirmed) {
            fetch('/ajax/delete-item/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value,
                    'X-Requested-With': 'XMLHttpRequest'
                },
                body: JSON.stringify({ type: itemType, id: itemId })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    Swal.fire({
                        title: 'נמחק!',
                        text: data.message,
                        icon: 'success',
                        timer: 1500,
                        showConfirmButton: false
                    }).then(() => {
                        if (reloadPage) {
                            location.reload();
                        }
                    });
                } else {
                    Swal.fire('אופס!', data.error, 'error');
                }
            })
            .catch(error => {
                Swal.fire('שגיאה', 'אירעה תקלה בתקשורת עם השרת.', 'error');
            });
        }
    });
}

function handlePostLike(postId, btn) {
    fetch(`/post/${postId}/like/`, {
        method: 'POST',
        headers: {
            'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value,
            'X-Requested-With': 'XMLHttpRequest'
        }
    })
    .then(response => response.json())
    .then(data => {
        const icon = btn.querySelector('i');
        const countSpan = btn.querySelector('.like-count');

        if (data.liked) {
            btn.classList.add('text-primary', 'fw-bold');
            btn.classList.remove('text-muted');
            icon.classList.replace('far', 'fas');
        } else {
            btn.classList.remove('text-primary', 'fw-bold');
            btn.classList.add('text-muted');
            icon.classList.replace('fas', 'far');
        }
        countSpan.innerText = data.total_likes;
    })
    .catch(err => console.error('Like Error:', err));
}

function toggleComments(postId) {
    const section = document.getElementById(`comments-section-${postId}`);
    if (section.classList.contains('d-none')) {
        section.classList.remove('d-none');
    } else {
        section.classList.add('d-none');
    }
}

function submitComment(postId) {
    const input = document.getElementById(`comment-input-${postId}`);
    const text = input.value.trim();

    if (!text) return;

    const formData = new FormData();
    formData.append('text', text);
    formData.append('csrfmiddlewaretoken', document.querySelector('[name=csrfmiddlewaretoken]').value);

    fetch(`/post/${postId}/comment/`, {
        method: 'POST',
        body: formData,
        headers: { 'X-Requested-With': 'XMLHttpRequest' }
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            const list = document.getElementById(`comments-list-${postId}`);
            const avatarHTML = data.user_img
                ? `<img src="${data.user_img}" class="rounded-circle shadow-sm" style="width: 32px; height: 32px; object-fit: cover;">`
                : `<div class="rounded-circle d-flex align-items-center justify-content-center border shadow-sm" style="width: 32px; height: 32px; background-color: var(--gd-card); border-color: var(--gd-border) !important;">
                       <i class="fas fa-user" style="font-size: 0.75rem; color: var(--gd-text-muted);"></i>
                   </div>`;

            const deleteBtnHTML = data.comment_id
                ? `<button class="btn btn-link text-danger p-1 px-2 border-0 transition-all" style="line-height: 1;" title="מחק תגובה" onclick="globalDelete('comment', ${data.comment_id})">
                       <i class="fas fa-trash-alt" style="font-size: 0.85rem;"></i>
                   </button>`
                : '';

            const wrapper = document.createElement('div');
            wrapper.className = 'd-flex gap-2 mb-2 animate__animated animate__fadeIn';
            if (data.comment_id) {
                wrapper.id = `comment-${data.comment_id}`;
            }

            wrapper.insertAdjacentHTML('beforeend', avatarHTML);

            const content = document.createElement('div');
            content.className = 'py-2 px-3 rounded-4 flex-grow-1 shadow-sm position-relative';
            content.style.backgroundColor = 'var(--gd-bg)';
            content.style.border = '1px solid var(--gd-border)';

            const header = document.createElement('div');
            header.className = 'd-flex justify-content-between align-items-start mb-1';

            const usernameSpan = document.createElement('span');
            usernameSpan.className = 'fw-bold small';
            usernameSpan.style.color = 'var(--gd-text)';
            usernameSpan.textContent = data.username;

            const meta = document.createElement('div');
            meta.className = 'd-flex align-items-center';

            const createdSpan = document.createElement('span');
            createdSpan.className = 'me-2';
            createdSpan.style.fontSize = '0.7rem';
            createdSpan.style.color = 'var(--gd-text-muted)';
            createdSpan.textContent = data.created_at;

            meta.appendChild(createdSpan);
            if (data.comment_id) {
                meta.insertAdjacentHTML('beforeend', deleteBtnHTML);
            }

            const textP = document.createElement('p');
            textP.className = 'small mb-0';
            textP.style.color = 'var(--gd-text)';
            textP.style.whiteSpace = 'pre-wrap';
            textP.style.lineHeight = '1.5';
            textP.textContent = data.text;

            header.appendChild(usernameSpan);
            header.appendChild(meta);
            content.appendChild(header);
            content.appendChild(textP);
            wrapper.appendChild(content);

            list.appendChild(wrapper);
            input.value = '';

            const countEl = document.getElementById(`comment-count-${postId}`);
            countEl.innerText = parseInt(countEl.innerText) + 1;

            list.scrollTo({ top: list.scrollHeight, behavior: 'smooth' });
        } else {
            Swal.fire('אופס!', data.error || 'אירעה שגיאה בשליחת התגובה.', 'error');
        }
    })
    .catch(err => {
        console.error('Comment Error:', err);
        Swal.fire('שגיאה', 'תקלה בתקשורת עם השרת.', 'error');
    });
}

function handleDocumentLike(docId, btn) {
    fetch(`/document/${docId}/like/`, {
        method: 'POST',
        headers: {
            'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value,
            'X-Requested-With': 'XMLHttpRequest'
        }
    })
    .then(response => response.json())
    .then(data => {
        const icon = btn.querySelector('i');
        const countSpan = btn.querySelector('.like-count-' + docId);

        if (data.liked) {
            btn.classList.add('text-primary');
            btn.classList.remove('text-muted');
            icon.classList.replace('far', 'fas');
            icon.animate([
                { transform: 'scale(1)' },
                { transform: 'scale(1.3)' },
                { transform: 'scale(1)' }
            ], { duration: 200 });
        } else {
            btn.classList.remove('text-primary');
            btn.classList.add('text-muted');
            icon.classList.replace('fas', 'far');
        }

        if (countSpan) {
            countSpan.innerText = data.total_likes;
        }
    })
    .catch(err => console.error('Doc Like Error:', err));
}

function getAISummary(docId, event) {
    if (event) event.stopPropagation();

    const btn = event.currentTarget;
    const container = document.getElementById(`ai-summary-container-${docId}`);
    if (!container) return;

    const textArea = container.querySelector('.summary-text');
    const originalContent = btn.innerHTML;
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';

    fetch(`/document/${docId}/ai-summary/`, {
        method: 'POST',
        headers: {
            'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value,
            'Content-Type': 'application/json'
        }
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            textArea.innerText = data.summary;
            container.classList.add('show');
            container.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        } else {
            Swal.fire('אופס!', data.error, 'error');
        }
    })
    .catch(error => {
        console.error('Error:', error);
        Swal.fire('שגיאה', 'תקלה בתקשורת עם שרת ה-AI.', 'error');
    })
    .finally(() => {
        btn.disabled = false;
        btn.innerHTML = originalContent;
    });
}
</script>

<script>
function openInviteModal() {
    const inviteLink = "{{ request.scheme }}://{{ request.get_host }}/?ref={{ user.profile.referral_code|default:'' }}";

    Swal.fire({
        title: 'שתפו את האתר!',
        iconHtml: '<i class="fas fa-gift text-primary"></i>',
        html:
            '<p class="mb-3 small text-muted">הזמינו חברים לבית Student Drive הסטודנט כדי שגם הם ייהנו מהקהילה!</p>' +
            '<div class="d-flex flex-column gap-3">' +
            '  <input type="text" id="invite-link-input" class="form-control text-center custom-invite-input" value="' + inviteLink + '" readonly>' +
            '  <button id="copy-btn" class="btn btn-primary custom-invite-btn w-100" type="button" onclick="copyInviteLink(event)">' +
            '    <i class="fas fa-copy me-1"></i>העתק קישור' +
            '  </button>' +
            '</div>',
        showCloseButton: true,
        showConfirmButton: false,
        customClass: {
            popup: 'custom-invite-popup notranslate',
            title: 'custom-invite-title'
        }
    });
}

function copyInviteLink(event) {
    const btn = event.currentTarget;
    const copyText = document.getElementById('invite-link-input');

    copyText.select();
    copyText.setSelectionRange(0, 99999);
    navigator.clipboard.writeText(copyText.value).then(() => {
        const originalHTML = btn.innerHTML;
        btn.innerHTML = '<i class="fas fa-check me-1"></i>הועתק!';
        btn.classList.remove('btn-primary');
        btn.classList.add('btn-success');
        btn.style.transform = 'scale(1.05)';
        setTimeout(() => {
            btn.style.transform = 'scale(1)';
        }, 150);
        setTimeout(() => {
            btn.innerHTML = originalHTML;
            btn.classList.remove('btn-success');
            btn.classList.add('btn-primary');
        }, 2500);
    }).catch(err => {
        console.error('Failed to copy: ', err);
        const originalHTML = btn.innerHTML;
        btn.innerHTML = '<i class="fas fa-times me-1"></i>שגיאה';
        btn.classList.remove('btn-primary');
        btn.classList.add('btn-danger');
        setTimeout(() => {
            btn.innerHTML = originalHTML;
            btn.classList.remove('btn-danger');
            btn.classList.add('btn-primary');
        }, 2000);
    });
}
</script>

<script>
    function toggleCustomMenu(event, menuId) {
        event.preventDefault();
        event.stopPropagation();

        const btn = event.currentTarget;
        const container = btn.closest('.custom-dropdown-container') || btn.parentElement;
        const menu = container.querySelector('.custom-dropdown-menu');

        if (!menu) {
            console.error('לא נמצא תפריט בתוך הקונטיינר!');
            return;
        }

        const isCurrentlyOpen = menu.classList.contains('show');

        document.querySelectorAll('.custom-dropdown-menu').forEach(m => m.classList.remove('show'));

        if (!isCurrentlyOpen) {
            menu.classList.add('show');

            const parentCard = menu.closest('.card');
            if (parentCard) {
                parentCard.style.overflow = 'visible';
                parentCard.style.zIndex = '100';
            }
        }
    }

    function openGlobalReportModal(docId, docTitle) {
        const titleElement = document.getElementById('reportDocTitle');
        if (titleElement) titleElement.innerText = '"' + docTitle + '"';

        const form = document.getElementById('globalReportForm');
        if (form) {
            form.action = form.action.replace(/\/0\//, '/' + docId + '/');
        }

        const modalElement = document.getElementById('globalReportModal');
        if (modalElement) {
            const modal = new bootstrap.Modal(modalElement);
            modal.show();
        }
    }

    document.addEventListener('click', function(event) {
        const anchor = event.target.closest('a[href="#"], a[href="javascript:void(0)"], a[href="javascript:void(0);"]');
        if (anchor) {
            event.preventDefault();
        }

        const isClickInsideMenu = event.target.closest('.custom-dropdown-menu');
        const isClickOnToggle = event.target.closest('.custom-dropdown-toggle') || event.target.closest('.mobile-menu-btn-responsive');

        if (!isClickInsideMenu && !isClickOnToggle) {
            document.querySelectorAll('.custom-dropdown-menu').forEach(menu => menu.classList.remove('show'));
        }
    });

    let deferredPrompt;

    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        checkAndShowBanner();
    });

    document.addEventListener('DOMContentLoaded', () => {
        if (window.innerWidth > 991) return;

        const isApple = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
        const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;

        const installBtnItem = document.getElementById('mobile-install-nav-item');
        if (installBtnItem && isStandalone) {
            installBtnItem.classList.add('d-none');
            installBtnItem.style.setProperty('display', 'none', 'important');
        }

        if (isApple && !isStandalone) {
            checkAndShowBanner(true);
        }
    });

    function checkAndShowBanner(isApple = false) {
        if (window.innerWidth > 991) return;

        const bannerDismissed = localStorage.getItem('appBannerDismissed');
        if (bannerDismissed) {
            const now = new Date().getTime();
            if (now - parseInt(bannerDismissed) < 604800000) return;
        }

        const btn = document.getElementById('app-banner-btn');
        if (btn) {
            btn.innerHTML = isApple ? '<i class="fab fa-apple me-1"></i> התקן' : '<i class="fab fa-android me-1"></i> התקן';
        }

        const banner = document.getElementById('smart-app-banner');
        if (banner) {
            setTimeout(() => {
                banner.classList.add('show-banner');
                document.body.classList.add('banner-active');
            }, 500);
        }
    }

    function dismissAppBanner() {
        const banner = document.getElementById('smart-app-banner');
        if (banner) {
            banner.classList.remove('show-banner');
            document.body.classList.remove('banner-active');
            localStorage.setItem('appBannerDismissed', new Date().getTime().toString());
        }
    }

    function installPWA() {
        const isApple = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

        const showInstallAlert = (options, fallbackText) => {
            if (window.Swal && typeof Swal.fire === 'function') {
                Swal.fire(options);
            } else {
                alert(fallbackText);
            }
        };

        if (deferredPrompt) {
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then((choiceResult) => {
                if (choiceResult.outcome === 'accepted') dismissAppBanner();
                deferredPrompt = null;
            });
        } else if (isApple) {
            showInstallAlert({
                title: 'התקנה באפל 🍏',
                html: '<div style="text-align: right; font-size: 0.95rem;">' +
                      'כדי להתקין את האפליקציה במכשיר שלך:<br><br>' +
                      '1. לחץ על כפתור השיתוף <i class="fas fa-external-link-alt mx-1 border rounded p-1"></i>.<br><br>' +
                      '2. בחר ב-<b>"הוסף למסך הבית"</b> <i class="fas fa-plus-square mx-1 border rounded p-1"></i>.<br></div>',
                icon: 'info',
                confirmButtonText: 'הבנתי',
                confirmButtonColor: '#1a73e8'
            }, 'כדי להתקין באייפון: פתח תפריט שיתוף ובחר "הוסף למסך הבית".');
        } else {
            showInstallAlert({
                title: 'התקנה לא זמינה כרגע',
                html: '<div style="text-align: right; font-size: 0.95rem;">' +
                      'נראה שהדפדפן עדיין לא סיפק בקשת התקנה אוטומטית.<br><br>' +
                      'נסה לרענן את העמוד, להשתמש ב-HTTPS, ואז לפתוח את תפריט הדפדפן ולבחור <b>Install app</b> / <b>Add to Home Screen</b>.' +
                      '</div>',
                icon: 'info',
                confirmButtonText: 'הבנתי',
                confirmButtonColor: '#1a73e8'
            }, 'התקנה לא זמינה כרגע. נסה לרענן את הדף או להשתמש באפשרות Install app בתפריט הדפדפן.');
        }
    }

    window.addEventListener('appinstalled', () => {
        dismissAppBanner();
    });
</script>

<script>
    function updateNotificationBadge() {
        fetch('/ajax/unread-notifications-count/')
            .then(response => response.json())
            .then(data => {
                if (data.has_urgent_alert) {
                    const alertKey = 'urgent_alert_shown_' + data.alert_id;
                    if (!sessionStorage.getItem(alertKey)) {
                        Swal.fire({
                            title: '🚨 דיווח זכויות יוצרים!',
                            text: data.urgent_message,
                            icon: 'error',
                            showCancelButton: true,
                            confirmButtonText: 'עבור לטיפול',
                            cancelButtonText: 'סגור',
                            confirmButtonColor: '#d33',
                            reverseButtons: true
                        }).then((result) => {
                            if (result.isConfirmed) {
                                window.location.href = data.alert_link;
                            }
                        });
                        sessionStorage.setItem(alertKey, 'true');
                    }
                }

                const badge = document.querySelector('.nav-notification-badge');
                if (badge) {
                    const count = data.unread_count;
                    if (count > 0) {
                        badge.textContent = count > 99 ? '99+' : count;
                        badge.style.display = 'inline-block';
                    } else {
                        badge.style.display = 'none';
                    }
                }
            })
            .catch(error => console.error('Error fetching notification count:', error));
    }

    document.addEventListener('DOMContentLoaded', updateNotificationBadge);
    setInterval(updateNotificationBadge, 10000);
</script>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        const a11yToggle = document.getElementById('a11y-toggle');
        const a11yMenu = document.getElementById('a11y-menu');
        const fontIncreaseBtn = document.getElementById('a11y-font-increase');
        const fontDecreaseBtn = document.getElementById('a11y-font-decrease');
        const contrastBtn = document.getElementById('a11y-contrast-toggle');
        const underlineBtn = document.getElementById('a11y-underline-toggle');

        const applyFontScale = (scale) => {
            const clamped = Math.max(0.9, Math.min(1.4, scale));
            document.documentElement.style.fontSize = `${clamped * 100}%`;
            localStorage.setItem('a11yFontScale', String(clamped));
        };

        const setToggleState = (key, className) => {
            const enabled = localStorage.getItem(key) === 'true';
            document.body.classList.toggle(className, enabled);
        };

        const savedScale = parseFloat(localStorage.getItem('a11yFontScale') || '1');
        applyFontScale(savedScale);
        setToggleState('a11yHighContrast', 'a11y-high-contrast');
        setToggleState('a11yUnderlineLinks', 'a11y-underline-links');

        if (a11yToggle && a11yMenu) {
            a11yToggle.addEventListener('click', () => {
                a11yMenu.classList.toggle('d-none');
            });
        }

        if (fontIncreaseBtn) {
            fontIncreaseBtn.addEventListener('click', () => {
                const current = parseFloat(localStorage.getItem('a11yFontScale') || '1');
                applyFontScale(current + 0.1);
            });
        }

        if (fontDecreaseBtn) {
            fontDecreaseBtn.addEventListener('click', () => {
                const current = parseFloat(localStorage.getItem('a11yFontScale') || '1');
                applyFontScale(current - 0.1);
            });
        }

        if (contrastBtn) {
            contrastBtn.addEventListener('click', () => {
                document.body.classList.toggle('a11y-high-contrast');
                localStorage.setItem('a11yHighContrast', document.body.classList.contains('a11y-high-contrast'));
            });
        }

        if (underlineBtn) {
            underlineBtn.addEventListener('click', () => {
                document.body.classList.toggle('a11y-underline-links');
                localStorage.setItem('a11yUnderlineLinks', document.body.classList.contains('a11y-underline-links'));
            });
        }
    });
</script>
