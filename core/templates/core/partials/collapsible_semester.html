<div class="semester-group mb-4 animate__animated animate__fadeIn">
    <div class="d-flex align-items-center justify-content-between p-3 rounded-3 cursor-pointer shadow-sm border semester-header"
         data-bs-toggle="collapse"
         data-bs-target="#collapse-{{ semester_id }}"
         aria-expanded="true"
         style="background-color: var(--gd-card); border-color: var(--gd-border) !important;">

        <div class="d-flex align-items-center gap-3">
            <div class="icon-circle-sm bg-primary bg-opacity-10 text-primary d-flex align-items-center justify-content-center" style="width: 35px; height: 35px; border-radius: 50%;">
                <i class="fas fa-layer-group"></i>
            </div>
            <h5 class="mb-0 fw-bold" style="color: var(--gd-text);">{{ title }}</h5>
            <span class="badge rounded-pill bg-secondary bg-opacity-10 text-muted small fw-normal border">
                {{ courses|length }} קורסים
            </span>
        </div>

        <div class="collapse-arrow">
            <i class="fas fa-chevron-down transition-transform" style="color: var(--gd-text-muted);"></i>
        </div>
    </div>

    <div class="collapse show" id="collapse-{{ semester_id }}">
        <div class="pt-3 px-1">
            <div class="list-group list-group-flush border rounded-3 overflow-hidden shadow-sm" style="border-color: var(--gd-border) !important;">
                {% for course in courses %}
                    {% include "core/partials/course_row.html" with course=course %}
                {% empty %}
                    <div class="list-group-item text-center py-4 text-muted border-0" style="background-color: transparent;">
                        <i class="fas fa-ghost mb-2 d-block fs-4 opacity-25"></i>
                        אין קורסים רשומים בסמסטר זה
                    </div>
                {% endfor %}
            </div>
        </div>
    </div>
</div>
