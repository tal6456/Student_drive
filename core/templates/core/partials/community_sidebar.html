<div class="card border-0 shadow-sm rounded-4 mb-4" style="background-color: var(--gd-card);">
    <div class="card-body p-0">
        <a href="?community={{ current_community.id }}" class="d-flex align-items-center gap-3 p-3 text-decoration-none border-bottom transition-all sidebar-link {% if not request.GET.type %}active-link{% endif %}" style="color: var(--gd-text); border-color: var(--gd-border) !important;">
            <div class="bg-primary bg-opacity-10 p-2 rounded-3">
                <i class="fas fa-stream text-primary"></i>
            </div>
            <span class="fw-bold">פיד הקהילה</span>
        </a>

        <a href="?community={{ current_community.id }}&type=market" class="d-flex align-items-center gap-3 p-3 text-decoration-none border-bottom transition-all sidebar-link {% if request.GET.type == 'market' %}active-link{% endif %}" style="color: var(--gd-text); border-color: var(--gd-border) !important;">
            <div class="bg-success bg-opacity-10 p-2 rounded-3">
                <i class="fas fa-tags text-success"></i>
            </div>
            <span class="fw-bold">לוח מודעות (דירות/ציוד)</span>
        </a>

        <a href="{% url 'my_friends' %}" class="d-flex align-items-center gap-3 p-3 text-decoration-none transition-all sidebar-link" style="color: var(--gd-text);">
            <div class="bg-info bg-opacity-10 p-2 rounded-3">
                <i class="fas fa-user-friends text-info"></i>
            </div>
            <span class="fw-bold">החברים שלי</span>
        </a>
    </div>
</div>

<div class="card border-0 shadow-sm rounded-4 mb-4" style="background-color: var(--gd-card);">
    <div class="card-body p-3">
        <h6 class="fw-bold mb-3 small text-muted" style="color: var(--gd-text-muted) !important;">הקבוצות שלי</h6>
        <div class="list-group list-group-flush gap-1">
            {% for comm in my_communities %}
                <a href="?community={{ comm.id }}" class="list-group-item list-group-item-action rounded-3 border-0 small transition-all {% if comm.id == current_community.id %}active-social{% endif %}" style="background-color: transparent; color: var(--gd-text);">
                    <i class="fas fa-users ms-2 opacity-50"></i> {{ comm.name }}
                </a>
            {% endfor %}
        </div>
    </div>
</div>

<style>
    /* אנימציות ורקעים יוקרתיים בתפריט הצד (Desktop) */
    .sidebar-link:hover { background-color: var(--gd-hover) !important; }
    .active-link { background-color: var(--gd-hover) !important; border-right: 4px solid var(--gd-primary); }
</style>
